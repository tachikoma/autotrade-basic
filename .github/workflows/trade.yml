name: 자동매매 실행

on:
  # 프리마켓 시작 시각으로 스케줄 설정 (DST 고려)
  # - 서머타임 기간(한국 현지 시차 반영): KST 17:00 -> UTC 08:00 (대략 4~10월)
  # - 비서머타임 기간: KST 18:00 -> UTC 09:00 (대략 11~3월)
  # 구현 방식: 월별로 UTC 시간을 분리하여 DST를 근사적으로 적용합니다.
  # 워크플로우는 매 시간 정각(UTC)으로 트리거됩니다. 내부에서 ET 시각을 계산해
  # 'America/New_York' 기준 ET 04:00일 때만 실제 작업을 진행합니다.
  # 이 방식은 서머타임 여부와 관계없이 항상 ET 04:00 실행을 보장합니다.
  # 프리마켓 시작 시각으로 스케줄 설정 (DST 고려)
  # - 서머타임 기간(4~10월): KST 17:00 => UTC 08:00
  # - 비서타임 기간(11~3월): KST 18:00 => UTC 09:00
  # 월별로 UTC 시간을 분리하여 DST를 근사적으로 적용합니다.
  schedule:
    # 서머타임(4~10월): KST 17:00 => UTC 08:00
    - cron: '0 8 * 4-10 1-5'
    # 비서타임(11~12월): KST 18:00 => UTC 09:00
    - cron: '0 9 * 11-12 1-5'
    # 비서타임(1~3월): KST 18:00 => UTC 09:00
    - cron: '0 9 * 1-3 1-5'
  
  # 수동 실행 가능
  workflow_dispatch:
    inputs:
      trade_mode:
        description: '거래 모드 선택'
        type: choice
        options:
          - DRY
          - LIVE

jobs:
  trade:
    runs-on: ubuntu-latest
    
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
      
      - name: uv 설치
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      
      - name: Python 설정
        run: uv python install
      
      - name: 의존성 설치
        run: uv sync
      
      - name: Resolve and log TRADE_MODE
        run: echo "Resolved TRADE_MODE=${{ inputs.trade_mode || secrets.TRADE_MODE || 'DRY' }}"

      - name: 자동매매 봇 실행
        env:
          # 한국투자증권 API 인증 정보
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
          
          # 거래 설정
          SYMBOL: ${{ secrets.SYMBOL }}
          EXCHANGE: ${{ secrets.EXCHANGE }}
          SPLITS: ${{ secrets.SPLITS }}
          TAKE_PROFIT: ${{ secrets.TAKE_PROFIT }}
          BIG_BUY_RANGE: ${{ secrets.BIG_BUY_RANGE }}
          
          # 거래 모드 (입력값 우선, 없으면 리포지토리 Secrets, 그다음 기본 'DRY')
          TRADE_MODE: ${{ inputs.trade_mode || secrets.TRADE_MODE || 'DRY' }}
          
          # 텔레그램 알림 설정 (선택사항)
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: uv run python trading_bot.py
